<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" role="img" aria-label="Roundtable">
  <title>Roundtable — favicon (optimised for small sizes)</title>
  <defs>
    <linearGradient id="rtFav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b91d6"></stop>
      <stop offset="72%" stop-color="#7c6cf0"></stop>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="48" height="48" rx="11" fill="url(#rtFav)"></rect>
  <g stroke="rgba(255,255,255,0.55)" stroke-width="1.8">
    <line x1="24" y1="11" x2="24" y2="24"></line>
    <line x1="36.4" y1="20" x2="24" y2="24"></line>
    <line x1="31.6" y1="34.5" x2="24" y2="24"></line>
    <line x1="16.4" y1="34.5" x2="24" y2="24"></line>
    <line x1="11.6" y1="20" x2="24" y2="24"></line>
  </g>
  <g fill="#ffffff">
    <circle cx="24" cy="11" r="3.6"></circle>
    <circle cx="36.4" cy="20" r="3.6"></circle>
    <circle cx="31.6" cy="34.5" r="3.6"></circle>
    <circle cx="16.4" cy="34.5" r="3.6"></circle>
    <circle cx="11.6" cy="20" r="3.6"></circle>
    <circle cx="24" cy="24" r="6.4"></circle>
  </g>
</svg>