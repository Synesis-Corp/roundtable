server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large request bodies (images, files via base64)
    client_max_body_size 100m;

    # ------------------------------------------------------------------------
    # Gzip compression for text assets. The base nginx:alpine image does not
    # include the Brotli dynamic module, so gzip is the best portable option.
    # Level 6 hits the sweet spot between CPU and size for JS/CSS bundles.
    # ------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # ------------------------------------------------------------------------
    # Security headers. NOTE: nginx `add_header` does NOT inherit into location
    # blocks that declare their OWN add_header — so the same set is repeated in
    # `location = /index.html` below, which is where the SPA document is served.
    # ------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS — tells browsers to only ever use HTTPS for this host. It is honoured
    # ONLY over TLS (ignored over plain HTTP), so it is safe to ship now, ahead
    # of the certbot/:443 cutover. Do NOT add `preload` until you are certain.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ------------------------------------------------------------------------
    # Static assets — cache aggressively
    # ------------------------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ------------------------------------------------------------------------
    # API proxy — forward all /api/* requests to the backend container
    # ------------------------------------------------------------------------
    location /api/ {
        # Strip the /api prefix when forwarding (backend routes don't have it)
        rewrite ^/api(/.*)$ $1 break;

        proxy_pass http://api:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts — generous for large uploads and streaming responses
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 300s;

        # SSE streaming: deliver chat tokens as they arrive, not buffered to the
        # end. Without this nginx buffers the whole response and breaks streaming.
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
    }

    # ------------------------------------------------------------------------
    # Health check endpoint (optional, useful for load balancers)
    # ------------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ------------------------------------------------------------------------
    # index.html — NEVER cache the SPA entry point. It references the
    # content-hashed asset bundles, so caching it means a new deploy isn't
    # picked up until a manual hard-refresh. The hashed assets above stay
    # immutable; only this entry document must always be revalidated. The
    # SPA fallback below does an internal redirect to /index.html, so this
    # exact-match location also covers every client-side route (/c/:id, etc).
    # ------------------------------------------------------------------------
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        # Re-declared here: a location with its own add_header drops the
        # server-level security headers, so they must be repeated.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        expires off;
        try_files $uri =404;
    }

    # ------------------------------------------------------------------------
    # SPA routing — fallback to index.html for client-side routes
    # ------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
