name: CI

# Gate de calidad: typecheck (build) + tests + lint en cada PR a main y en push a main.
# Regla operativa #5: ningún paso crítico usa `|| true` — si algo falla, el job aborta.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela corridas viejas del mismo ref si llega una nueva (ahorra minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # pnpm@9 — lee la versión del campo packageManager de package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ESLint flat config (eslint.config.mjs) sobre todo el monorepo.
      # Falla el job ante cualquier error.
      - name: Lint
        run: pnpm lint

      # Genera el Prisma Client (sin conexión a DB) — necesario porque @chat/db
      # reexporta tipos de @prisma/client y tsc falla si no está generado.
      - name: Generate Prisma Client
        run: pnpm db:generate

      # build = `tsc` (api) y `tsc && vite build` (web): hace de typecheck.
      # `pnpm typecheck` existe como gate dedicado (`tsc --noEmit` por app) para
      # DX local rápido — no se corre acá porque ya es subset del build de arriba.
      - name: Build (typecheck)
        run: pnpm build

      # Baja el binario CPython-WASI (pinned + SHA-256) que usa el sandbox
      # run_python (#8). Sin él, los tests de integración de WasiSandboxRunner
      # se saltean (skipIf) y el archivo queda sin cubrir → el coverage gate
      # cae por debajo del threshold. Con él, el CI ejerce el sandbox real.
      - name: Fetch Python-WASI sandbox runtime
        run: pnpm --filter @chat/api fetch:python-wasm

      # Los tests de API mockean Prisma (vi.mock("@chat/db")) — no requieren
      # una base de datos real, por eso no hay servicio Postgres en el CI.
      - name: Test
        run: pnpm test

      # Coverage gate — corre `vitest --coverage` y falla si cualquier
      # threshold de apps/api/vitest.config.ts o apps/web/vitest.config.ts
      # se viola. Reportes en lcov (subibles a codecov en el futuro).
      - name: Coverage gate
        run: pnpm coverage

      # Sube el reporte de coverage como artifact aunque no haya fallado
      # (los reviewers pueden descargarlo y mirar el HTML).
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: |
            apps/api/coverage/lcov-report/
            apps/web/coverage/lcov-report/
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Runs on BOTH push-to-main and PR. The project uses a direct-commit-to-main
    # flow (PRs are rare), so gating E2E behind `pull_request` only meant it never
    # ran. Now every change to main goes through the full stack E2E gate.

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # ── Build & start the full stack via docker-compose ──────────────────
      # The compose file reads env_file: .env (gitignored), so generate a
      # minimal one with test-only secrets before building.
      - name: Generate .env for docker compose
        run: |
          cat > .env <<'EOF'
          # Postgres creds — use defaults (postgres:postgres) for CI.
          # In prod, set POSTGRES_USER/POSTGRES_PASSWORD via GitHub Secrets.
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=chatia
          # Application secrets — test-only values for CI.
          JWT_SECRET=e2e-test-jwt-secret-at-least-32-chars-long
          ENCRYPTION_SECRET=e2e-test-encryption-secret-32chars
          ENCRYPTION_SALT=e2e-test-salt-16ch
          GOOGLE_CLIENT_ID=e2e-test-client-id.apps.googleusercontent.com
          EOF

      - name: Start stack
        run: docker compose up --build -d

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/health >/dev/null 2>&1; then
              echo "Stack healthy after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "Stack did not become healthy"
          docker compose logs --tail=80
          exit 1

      # ── Playwright ──────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost
          PLAYWRIGHT_PORT: "80"
        run: npx playwright test

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      # Always tear down, even if tests fail.
      - name: Tear down stack
        if: always()
        run: docker compose down -v
